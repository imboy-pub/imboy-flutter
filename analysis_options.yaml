# imboyapp Dart/Flutter analyzer 配置
#
# 关联：.claude/plans/quality-loop.md v1.3 T2.3
# v1.0 主计划假设 very_good_analysis；项目实际用 flutter_lints ^6.0.0（pubspec.yaml:332）
# 本次保留 flutter_lints 基础，叠加 analyzer.language strict-* 字段实现严格化目标
# （strict-casts/inference/raw-types 是 Dart 内置严格模式，与 lint package 正交）
#
# 设计决策：
# - 不动 pubspec.yaml（守 LOOP_PROMPT 不变量 6 - 不自动跑 pub get）
# - 不破坏已有项目特化（plugin/** 保留区、模块边界自定义脚本、legacy debt 关闭项）
# - 增补 codegen 后缀 exclude（.g.dart / .freezed.dart / .gr.dart / .pb.dart 等）
# - strict-casts 触发的诊断分阶段处理：先 info 级让基线扫描可见，T2.7 阶段决定是否升级
#
# 参考：https://dart.dev/tools/analysis

include: package:flutter_lints/flutter.yaml

analyzer:
  # ---- v1.3: 严格化静态分析（新增于 2026-05-08）----
  language:
    strict-casts: true        # 禁止隐式 dynamic → 具体类型转换（暴露隐式类型不安全）
    strict-inference: true    # 禁止类型推断为 dynamic（强制显式类型）
    strict-raw-types: true    # 禁止 raw type（如 List 必须写 List<T>）

  # ---- 错误降级策略 ----
  # 启用 strict-* 后会有大量 ERROR 阻塞 flutter analyze 与 lefthook pre-commit。
  # 为不破坏 imboyapp/CLAUDE.md 声明的「flutter analyze 零警告」基线，本次将所有
  # strict-casts 触发的 error 全部降为 info（IDE 仍高亮，CI 不阻塞，T2.7 评估后再升级）。
  errors:
    # strict-casts 触发的 diagnostic（基线 2026-05-08：118 个 error 全部来自此组）
    argument_type_not_assignable: info        # 400 处
    invalid_assignment: info                   # 135 处
    return_of_invalid_type: info               # 51 处
    return_of_invalid_type_from_closure: info  # 3 处
    non_bool_condition: info                   # 23 处
    non_bool_operand: info                     # 18 处
    non_bool_negation_expression: info         # 1 处
    for_in_of_invalid_type: info               # 16 处
    list_element_type_not_assignable: info     # 4 处
    set_element_type_not_assignable: info      # 1 处
    throw_of_invalid_type: info                # 1 处
    # 历史宽松项保留（避免本次提升触发大量 ERROR）
    todo: ignore                                # TODO 注释不算诊断
    deprecated_member_use_from_same_package: ignore  # 同包内 deprecated 互调

  exclude:
    # 保留区（imboyapp/CLAUDE.md 明示禁止修改）
    - plugin/**
    # codegen 输出（freezed / json_serializable / build_runner / slang / protobuf / auto_route）
    - "lib/**/*.g.dart"
    - "lib/**/*.freezed.dart"
    - "lib/**/*.gr.dart"
    - "lib/**/*.pb.dart"
    - "lib/**/*.pbenum.dart"
    - "lib/**/*.pbjson.dart"
    - "lib/**/*.pbserver.dart"
    - "lib/i18n/strings.g.dart"
    - "lib/api/_gen/**"
    # 构建产物
    - "build/**"
    - ".dart_tool/**"

  # Architecture note:
  # Domain callers should import `lib/modules/<domain>/public.dart` only.
  # Boundary enforcement lives in `dart run tool/check_module_boundaries.dart`.

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # avoid_print: 升级为全局强制；新代码必须用 if (kDebugMode) debugPrint(...)
    # 历史债务 724 处通过 CI new-code guard 逐步清理
    avoid_print: true
    use_build_context_synchronously: false
    # Module boundary checks are handled by the custom gate script above because
    # analyzer lints cannot express the current domain-aware import policy.
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
