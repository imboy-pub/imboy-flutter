name: ImBoy CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
  schedule:
    # 每日 UTC 18:00 跑全量路由烟雾测试（进程隔离，较慢，不放 PR 快速门）
    - cron: '0 18 * * *'

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  # ==================== 测试任务 ====================
  unit-widget-test:
    name: Run Unit/Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CI test paths
        run: .github/scripts/validate_ci_test_paths.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: flutter format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Check module boundaries
        run: dart scripts/check_boundaries.dart
        continue-on-error: true   # 基线期，收集数据；归零后删此行

      - name: New code guard (changed dart files)
        run: .github/scripts/lint_changed_dart.sh

      - name: Run unit/widget tests
        run: |
          # 排除 test/integration/（独立 job）与 test/smoke/（共享 isolate 会级联，
          # 由专用隔离 runner job route-smoke-test 运行）。
          TEST_FILES="$(find test -type f -name '*_test.dart' ! -path 'test/integration/*' ! -path 'test/smoke/*' | tr '\n' ' ')"
          if [ -z "$TEST_FILES" ]; then
            echo "No unit/widget test files found outside test/integration/ and test/smoke/"
            exit 0
          fi
          flutter test $TEST_FILES --reporter=github

      - name: Moment regression gate
        run: |
          flutter test test/service/message_type_constants_test.dart --reporter=github
          flutter test test/service/message_s2c_test.dart --reporter=github
          flutter test test/service/moment_event_test.dart --reporter=github
          flutter test test/page/moment/moment_routes_test.dart --reporter=github

  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration/ --reporter=github

      - name: Channel regression gate (test/integration)
        run: flutter test test/integration/channel_integration_test.dart --reporter=github

      - name: Run integration_test suite
        run: |
          TEST_FILES="$(find integration_test -type f -name '*_test.dart' | tr '\n' ' ')"
          if [ -z "$TEST_FILES" ]; then
            echo "No test files found under integration_test/"
            exit 0
          fi
          flutter test integration_test/ --reporter=github

      - name: Generate coverage report
        run: |
          flutter test test/integration/ --coverage
          mv coverage/lcov.info coverage/lcov.test_integration.info

          TEST_FILES="$(find integration_test -type f -name '*_test.dart' | tr '\n' ' ')"
          if [ -z "$TEST_FILES" ]; then
            echo "No test files found under integration_test/, skip integration_test coverage"
            cp coverage/lcov.test_integration.info coverage/lcov.integration_test.info
          else
            flutter test integration_test/ --coverage
            mv coverage/lcov.info coverage/lcov.integration_test.info
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.test_integration.info,coverage/lcov.integration_test.info
          flags: integration-tests
          name: integration-test-coverage

  # ==================== 构建任务 ====================
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [unit-widget-test, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Inject Firebase google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_B64 != '' }}
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Build APK (Release)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build apk --release \
            --dart-define=SENTRY_DSN="${SENTRY_DSN:-}"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ==================== iOS构建任务 ====================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [unit-widget-test, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Inject Firebase GoogleService-Info.plist
        if: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 != '' }}
        env:
          GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Build iOS (Release)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SENTRY_DSN="${SENTRY_DSN:-}"

  # ==================== 静态分析任务 ====================
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub

      - name: Check code coverage
        run: |
          flutter test --coverage
          test -f coverage/lcov.info

  # ==================== 性能测试任务 ====================
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run performance tests
        run: |
          flutter test test/integration/conversation_state_mock_test.dart --reporter=github
          flutter test test/integration/message_action_conversation_update_mock_test.dart --name="性能" --reporter=github

  # ----------------------------------------------------------------
  # DCO — 仅 PR 检查，验证所有 commits 带有 Signed-off-by
  # ----------------------------------------------------------------
  dco-check:
    name: DCO check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO check
        uses: dco-org/dco-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------
  # 全页面路由烟雾测试（进程隔离）——仅 nightly schedule + 手动触发。
  # 每条路由独立进程运行，规避共享 isolate 级联；较慢，不放 PR 快速门。
  # ----------------------------------------------------------------
  route-smoke-test:
    name: Route Smoke Test (isolated)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run isolated route smoke test
        run: bash test/smoke/run_smoke_isolated.sh --quiet
