# SonarCloud configuration for imboyapp (Flutter client)
#
# 关联：.claude/plans/quality-loop.md v1.3 T4.3（v1.1 §332: 三独立 SonarCloud 项目）
# 创建：2026-05-09 / iteration 78 / T4.3
# 用户配置：在 SonarCloud 创建 imboyapp 项目 + 配 GitHub Secret SONAR_TOKEN

sonar.projectKey=imboyapp
sonar.organization=imboy-pub
sonar.projectName=imboyapp (Flutter Client)
sonar.projectVersion=1.0.0-rc.1

# Source layout
sonar.sources=lib
sonar.tests=test,integration_test
sonar.sourceEncoding=UTF-8

# Exclusions（与 analysis_options.yaml exclude 对齐）
sonar.exclusions=\
  build/**,\
  .dart_tool/**,\
  ios/**,\
  macos/**,\
  plugin/**,\
  android/.gradle/**,\
  android/build/**,\
  android/app/build/**,\
  lib/**/*.g.dart,\
  lib/**/*.freezed.dart,\
  lib/**/*.gr.dart,\
  lib/**/*.pb.dart,\
  lib/**/*.pbenum.dart,\
  lib/**/*.pbjson.dart,\
  lib/**/*.pbserver.dart,\
  lib/i18n/strings.g.dart,\
  lib/api/_gen/**

sonar.test.exclusions=\
  test/fixtures/**,\
  integration_test/fixtures/**

# Coverage（flutter test --coverage 后 coverage/lcov.info）
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Dart language settings
sonar.dart.file.suffixes=.dart
