  tobias: ^5.3.4                    # Alipay SDK (支付宝收银台) (updated: 4.0.0 → 5.3.4)
  flutter_vodozemac: ^0.5.0
  vodozemac: ^0.5.0


dependency_overrides:
  # ┌─ Analyzer Override ───────────────────────────────────────────────┐
  # riverpod_generator 4.0.3 要求 analyzer ^9。锁 ^9（上个提交验证 working 的组合）。
  # 4.0.4 要求 analyzer ^12，但其传递依赖 mockito 5.7.0 要求 analyzer ^13，
  # mockito builder 在 analyzer 12 下编译失败（NamedArgument 在 9 之后删除、13 才恢复）。
  analyzer: ^9.0.0
  # dart_style 3.1.3 兼容 analyzer ^9（>=8.2.0 <10.0.0）。
  dart_style: 3.1.3
  # mockito（riverpod_generator 传递依赖）5.7.0 的 builder 在 analyzer 9 下编译失败
  # （substitute API 属 analyzer 13）；5.6.4 声明 analyzer >=8.1.1 <13，与 ^9 兼容。
  mockito: 5.6.4

  # ┌─ path_provider_foundation Override ────────────────────────────────┐
  # 2.6.0 migrated to FFI + objective_c native assets hook, which Flutter
  # 3.41.6 stable does NOT fully bundle → macOS app crashes on launch with
  # "Couldn't resolve native function 'DOBJC_initializeApi'".
  # Pin to 2.5.x (last version using traditional Swift plugin).
  # Revisit after upgrading Flutter to a version with stable code_assets 1.0.0 support.
  path_provider_foundation: ">=2.4.0 <2.6.0"

  # ┌─ win32 / package_info_plus Override ──────────────────────────────────┐
  # file_picker 11.x 仍依赖 win32 ^5.9.0，故整个 win32 栈锁定在 5.x。
  # 待 file_picker 发布 win32 6.x 兼容版后统一升级整个 win32 栈。
  win32: ^5.15.0
  # flutter_secure_storage_windows 4.2.x 已迁移到 win32 6.x API（Win32Result / toHRESULT）。
  # 4.1.x 是与 win32 5.x 兼容的最后一代；flutter_secure_storage 10.x 约束为 ^4.1.0，4.1.x 满足。
  # 与 file_picker / win32 5.x pin 同命运，待 file_picker 升 win32 6.x 后统一解锁。
  flutter_secure_storage_windows: ">=4.1.0 <4.2.0"
  # package_info_plus 10.x 已迁移到 win32 6.x API（toPcwstr / toHRESULT / Pointer.value）。
  # 8.x 是 win32 5.x 代的最后一条线，与本块 win32 pin 匹配。
  package_info_plus: ^8.3.0
  # win32_registry 3.x 迁移到 win32 6.x API（REG_SAM_FLAGS / PWSTR / IntPtr）。
  # 与本块 win32 5.x pin 硬冲突，且 sqflite_sqlcipher → win32_registry 是所有
  # API / Repo 测试的传递依赖，不锁 2.x 则整个测试套件无法在 macOS 上编译。
  # 与 win32 5.x pin 同命运：待 file_picker 迁移 6.x 后统一解锁。
  win32_registry: ^2.0.0
  # device_info_plus 12+ 同样迁移到 win32 6.x API（LOCAL_MACHINE / Win32Result.value）。
  # HttpClient 链路（User-Agent / 设备标识）间接依赖，API 测试必经路径。
  # 11.5.0 是 win32 5.x 代的最后版本，与本块 win32/win32_registry pin 同命运。
  device_info_plus: ^11.5.0

  # ┌─ Local Plugin Overrides ──────────────────────────────────────────┐
  flutter_chat_core:
    path: plugin/flutter_chat_ui/packages/flutter_chat_core
  flutter_chat_ui:
    path: plugin/flutter_chat_ui/packages/flutter_chat_ui
  flyer_chat_text_stream_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_stream_message
  flyer_chat_text_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_message
  flyer_chat_image_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_image_message
  flyer_chat_video_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_video_message
  flyer_chat_file_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_file_message
  flyer_chat_system_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_system_message
  flyer_chat_audio_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_audio_message
  flyer_chat_location_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_location_message
  cross_cache:
    path: plugin/flutter_chat_ui/packages/cross_cache
  jverify:
    path: plugin/jverify


