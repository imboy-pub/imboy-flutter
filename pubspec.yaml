dev_dependencies:
  flutter_test:
    sdk: flutter

  # ┌─ Code Generation ─────────────────────────────────────────────┐
  build_runner: ^2.12.2                # Code generation for Riverpod, slang, envied
  riverpod_generator: 4.0.3            # pin: 4.0.4 传递依赖 mockito 5.7.0 (^13) 与自身 analyzer ^12 冲突，builder 无法编译
  envied_generator: ^1.3.8             # Environment variables code generation (updated: 1.3.2 → 1.3.8)

  # ┌─ Code Quality & Linting ───────────────────────────────────────┐
  flutter_lints: ^6.0.0                # Official Flutter linting rules

  # ┌─ Testing ─────────────────────────────────────────────────────┐
  test: any                            # Pure dart test runner (used by test/api/ without Flutter binding)
  mocktail: ^1.0.4                     # Mocking library for testing
  # mockito 已移除：5.7.0 要求 analyzer ^13，与 riverpod_generator 4.0.4 (^12) 冲突；
  # mockito 跳过 analyzer 12 时代，无任何版本兼容 riverpod 代码生成链。
  # 3 个 service 测试待迁移 mocktail（@GenerateMocks → when/verify）：
  #   test/service/{ack_manager_enhanced,network_monitor_enhanced,websocket_heartbeat}_test.dart
  fake_async: ^1.3.2                   # Fake async for testing (direct dep for analyzer)

  # ┌─ Integration Testing ──────────────────────────────────────────┐
  integration_test:
    sdk: flutter

  # ┌─ AI Testing Framework ────────────────────────────────────────────┐
  # 🤖 AI 驱动测试框架 - MVP 精简版
  # openai: ^1.0.0                    # OpenAI API 客户端 (GPT-4/3.5) - 暂时禁用
  # 其他依赖按需添加...

