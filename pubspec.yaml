# ┌─────────────────────────────────────────────────────────────────┐
# │ 🔧 Development Dependencies                                       │
# └─────────────────────────────────────────────────────────────────┘
dev_dependencies:
  flutter_test:
    sdk: flutter

  # ┌─ Code Generation ─────────────────────────────────────────────┐
  build_runner: ^2.12.2                # Code generation for Riverpod, slang, envied
  riverpod_generator: ^4.0.2           # Riverpod annotation code generation (updated: 4.0.0+1 → 4.0.2)
  envied_generator: ^1.3.2             # Environment variables code generation

  # ┌─ Code Quality & Linting ───────────────────────────────────────┐
  flutter_lints: ^6.0.0                # Official Flutter linting rules

  # ┌─ Testing ─────────────────────────────────────────────────────┐
  mocktail: ^1.0.4                     # Mocking library for testing
  mockito: ^5.4.6                      # Mockito mocking library

  # ┌─ Integration Testing ──────────────────────────────────────────┐
  integration_test:
    sdk: flutter

  # ┌─ AI Testing Framework ────────────────────────────────────────────┐
  # 🤖 AI 驱动测试框架 - MVP 精简版
  # openai: ^1.0.0                    # OpenAI API 客户端 (GPT-4/3.5) - 暂时禁用
  # 其他依赖按需添加...

# ┌─────────────────────────────────────────────────────────────────┐
# │ 📦 Flutter Configuration                                          │
# └─────────────────────────────────────────────────────────────────┘
# For information on the generic Dart part of this file, see:
# https://dart.dev/tools/pub/pubspec
flutter:

  # ┌─ Material Design ───────────────────────────────────────────────┐
  # Ensures the Material Icons font is included with your application
  uses-material-design: true

  # ┌─ Custom Fonts ──────────────────────────────────────────────────┐
  fonts:
    - family: IMBoyIcon  # 自定义图标字体
      fonts:
        - asset: assets/fonts/iconfont.ttf

  # ┌─ Assets & Resources ────────────────────────────────────────────┐
  assets:
    - assets/example10.db                  # 示例数据库
    - assets/data/region.json              # 地区数据
    - assets/images/                       # 通用图片资源
    # 数据库迁移脚本
    - assets/migrations/upgrade.sql        # 升级迁移脚本
    - assets/migrations/downgrade.sql      # 降级迁移脚本
