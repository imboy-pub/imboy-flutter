# https://dart.dev/tools/pub/pubspec
  permission_handler_platform_interface: any
  plugin_platform_interface: any
  yaml: any
flutter:

  # ┌─ Material Design ───────────────────────────────────────────────┐
  # Ensures the Material Icons font is included with your application
  uses-material-design: true

  # ┌─ Custom Fonts ──────────────────────────────────────────────────┐
  fonts:
    - family: IMBoyIcon  # 自定义图标字体
      fonts:
        - asset: assets/fonts/iconfont.ttf

  # ┌─ Assets & Resources ────────────────────────────────────────────┐
  assets:
    - assets/example10.db                  # 示例数据库
    - assets/data/region.json              # 地区数据
    - assets/images/                       # 通用图片资源
    # 数据库迁移脚本
    - assets/migrations/upgrade.sql        # 升级迁移脚本
    - assets/migrations/downgrade.sql      # 降级迁移脚本
    - assets/migrations/baseline_schema.sql # 基线建表 DDL（从 example10.db 导出）
