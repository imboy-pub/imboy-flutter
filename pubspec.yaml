name: imboy
description: A new Flutter project for IM.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.7.1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  ##############################################
  # Core Flutter & UI Framework
  ##############################################
  cupertino_icons: ^1.0.8 # iOS style icons
  flutter_screenutil: ^5.9.3 # Screen adaptation
  google_fonts: ^7.0.2    # Google Fonts
  flutter_animate: ^4.5.2  # Animation library
  octo_image: ^2.1.0      # 多功能 Flutter 图像小部件
  flutter_svg: ^2.2.3     # SVG rendering
  dotted_border: ^3.1.0   # Custom border styles
  flutter_spinkit: ^5.2.2  # Loading animations
  shimmer: ^3.0.0
  flutter_easyloading: ^3.0.5 # Toast/loading widgets
  flutter_native_splash: ^2.4.7 # Splash screen generation
  fps_monitor: ^2.0.0     # Performance monitoring

  ##############################################
  # Network & Web
  ##############################################
  dio: ^5.9.0       # HTTP client
  dio_http2_adapter: ^2.6.0 # HTTP/2 support
  web_socket_channel: ^3.0.3 # WebSocket support
  http: ^1.6.0            # Additional HTTP utilities
  connectivity_plus: ^7.0.0 # Network status
  webview_flutter: ^4.13.0 # WebView integration
  url_launcher: ^6.3.2    # URL handling
  mime: ^2.0.0            # MIME type handling

  ##############################################
  # Data & Storage
  ##############################################
  shared_preferences: ^2.5.4 # Local storage
  flutter_secure_storage: ^10.0.0 # Secure storage
  sqflite: ^2.4.2         # SQLite database
  path: ^1.9.0           # Path manipulation
  archive: ^4.0.7        # ZIP compression for backup

  ##############################################
  # Theme & UI Enhancement
  ##############################################
  dynamic_color: ^1.7.0   # Material 3 dynamic colors
  cross_cache: any      # Cross-platform cache
  #flutter_cache_manager: ^3.4.1 # Cache management
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0 # Package information

  ##############################################
  # Media & Camera
  ##############################################
  #camera: ^0.10.0         # Camera access
  #camera: ^0.11.3 # dep by wechat_camera_picker
  wechat_camera_picker: ^4.4.0 # Camera picker
  wechat_assets_picker: ^10.0.0 # Asset picker
  photo_view: ^0.15.0     # Interactive image viewer
  photo_manager: ^3.8.3   # Media management
  video_compress: ^3.1.4  # Video compression
  image_picker: ^1.2.1    # Image picker
  file_picker: ^10.3.8    # File picker
  open_file: ^3.5.10      # File opening
  image_crop:             # Image cropping
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_crop.git
      ref: leeyi
  image: ^4.7.1           # Image manipulation
  image_gallery_saver:    # Save to gallery
    #path: plugin/image_gallery_saver
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_gallery_saver.git
      ref: leeyi
  video_player: ^2.10.1    # Video playback
  flutter_local_notifications: ^19.5.0 # Local notifications

  ##############################################
  # Audio
  ##############################################
  flutter_sound: ^9.30.0  # Audio recording/playback - Latest version with improved macOS support
  audio_session: ^0.2.2   # Audio session management
  flutter_webrtc: ^1.2.1 # WebRTC for audio/video calls
  audio_waveforms: ^2.0.1 # Audio waveforms
  just_audio: ^0.10.5

  ##############################################
  # Chat & Messaging
  ##############################################
  flutter_chat_core: any
  flutter_chat_ui: any
  flyer_chat_audio_message: any
  flyer_chat_custom_message: any
  flyer_chat_file_message: any
  flyer_chat_image_message: any
  flyer_chat_location_message: any
  flyer_chat_system_message: any
  flyer_chat_text_message: any
  flyer_chat_text_stream_message: any

  flyer_chat_video_message: any

  bubble: ^1.2.1          # Chat bubbles
  emoji_picker_flutter: ^4.4.0 # Emoji picker
  highlight_text: ^1.8.0  # Text highlighting
  flutter_markdown: ^0.7.7 # Markdown rendering

  ##############################################
  # Lists & Navigation
  ##############################################
  azlistview:             # Alphabetical list view
    git:
      url: https://gitee.com/imboy-tripartite-deps/azlistview.git
      ref: leeyi
  easy_refresh: ^3.4.0    # Pull-to-refresh
  flutter_slidable: ^4.0.3 # Slidable list items
  # scroll_to_index 已弃用并移除
  sliding_up_panel: ^2.0.0+1 # Sliding panels

  ##############################################
  # Maps & Location
  ##############################################
  amap_flutter_base_plus: ^3.1.0
  amap_flutter_map_plus:
    #path: plugin/amap_flutter_map_plus
    git:
      #url: https://github.com/botslabapp/amap_flutter_map_plus-3.1.1.git
      url: https://github.com/leeyisoft/amap_flutter_map_plus.git
      ref: main
  amap_flutter_location_plus:
     git:
       url: https://github.com/xiejeep/amap_flutter_location_plus.git
       ref: main
  map_launcher: ^4.4.2    # Map apps launcher

  ##############################################
  # QR Code
  ##############################################
  qr_flutter: ^4.1.0      # QR code generation
  mobile_scanner: ^7.1.4  # QR code scanning

  ##############################################
  # Utilities
  ##############################################
  logger: ^2.6.2          # Logging
  event_bus_plus: ^0.7.0  # Event bus with progress tracking
  jose: ^0.3.5            # JWT handling
  pointycastle: ^4.0.0    # 一个基于 Dart 语言的库，实现了加密算法和原语，其设计灵感来源于 BouncyCastle 库
  asn1lib: ^1.6.5        # ASN.1 encoding/decoding library
  crypto: ^3.0.6         # Cryptographic hashing (used by video_thumbnail)
  convert: ^3.1.2        # Data conversion utilities (used by encrypter)
  image_picker_platform_interface: ^2.10.0 # Image picker platform interface
  permission_handler: ^12.0.1 # Permissions
  path_provider: ^2.1.5   # File system paths
  file_saver: ^0.3.1
  xid: ^1.2.1             # Unique ID generation
  ntp: ^2.0.0             # Network time protocol
  clock: ^1.1.2           # Time utilities
  equatable: ^2.0.7       # Object equality
  synchronized: ^3.4.0    # Synchronization
  share_plus: ^12.0.1     # Sharing
  wakelock_plus: ^1.4.0   # Keep screen awake
  # drag_ball 已移除 - 未使用的辅助球组件
  r_upgrade:              # App upgrade
    git:
      url: https://gitee.com/imboy-tripartite-deps/r_upgrade.git
      ref: leeyi
    #path: plugin/r_upgrade
  ic_storage_space:       # Storage space info
    git:
      url: https://github.com/leeyisoft/IcStorageSpace.git
      ref: leeyi
    #path: plugin/ic_storage_space
  badges: ^3.1.2          # Badge indicators
  carousel_slider_plus: ^7.1.1 # Carousel slider
  textfield_tags: ^3.0.1  # Tag input field
  flutter_rating_bar: ^4.0.1
  filter_list:            # Filterable lists
    git:
      url: https://gitee.com/imboy-tripartite-deps/flutter_plugin_filter_list.git
      ref: leeyi

  ##############################################
  # Authentication & Security
  ##############################################
  envied: ^1.3.2
  local_auth: ^3.0.0      # Local authentication
  pin_code_fields: ^8.0.1 # PIN code input
  intl_phone_number_input: ^0.7.5 # Phone number input
  jverify: ^3.1.7             # JVerification
    #path: plugin/jverify

  ##############################################
  # Internationalization
  ##############################################
  lpinyin: ^2.0.3         # Chinese pinyin
  intl: ^0.20.2           # Internationalization
  feedback: ^3.2.0
  # Flutter 的弹出窗口。弹出窗口是一种瞬态视图，当您点击某个控件或某个区域时，它会出现在屏幕上其他内容的上方。
  popover: ^0.4.0
  popup_menu: ^2.1.0
  characters: ^1.4.0
  provider: ^6.1.5+1
  visibility_detector: ^0.4.0+2
  slang: ^4.11.2
  slang_flutter: ^4.11.0
  go_router: ^17.0.1
  flutter_riverpod: ^3.1.0 # 状态管理
  riverpod_annotation: ^4.0.0
  #archive: ^4.0.7
  #dart_duckdb: ^1.2.2


dependency_overrides:
  flutter_chat_core:
    path: plugin/flutter_chat_ui/packages/flutter_chat_core
  flutter_chat_ui:
    path: plugin/flutter_chat_ui/packages/flutter_chat_ui
  flyer_chat_custom_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_custom_message
  flyer_chat_text_stream_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_stream_message
  flyer_chat_text_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_message
  flyer_chat_image_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_image_message
  flyer_chat_video_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_video_message
  flyer_chat_file_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_file_message
  flyer_chat_system_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_system_message
  flyer_chat_audio_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_audio_message
  flyer_chat_location_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_location_message
  cross_cache:
    path: plugin/flutter_chat_ui/packages/cross_cache


#  characters: ^1.4.0
  #audio_session: ^0.2.2
#  just_audio: ^0.10.5
#  intl: ^0.20.2
#  camera: ^0.11.2 # dep by wechat_camera_picker

#  scroll_to_index: // 打算弃用
#    git:
#      url: https://gitee.com/imboy-tripartite-deps/scroll-to-index_scroll_with_keep_alives_fix.git
#      ref: scroll_with_keep_alives_fix

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.10.4
  riverpod_generator: ^4.0.0+1

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  fonts:
    - family: IMBoyIcon  #指定一个字体名
      fonts:
        - asset: assets/fonts/iconfont.ttf
  assets:
    - assets/example10.db
    - assets/data/region.json
    - assets/images/
    # 数据管理模块 - 数据库迁移脚本
    - assets/migrations/upgrade.sql
    - assets/migrations/downgrade.sql
