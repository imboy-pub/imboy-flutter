name: imboy
description: A new Flutter project for IM.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.7.1

environment:
  sdk: ^3.8.0

hooks:
  user_defines:
    sqlite3:
      source: system

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 🎨 Core Flutter & UI Framework                                   │
  # └─────────────────────────────────────────────────────────────────┘
  cupertino_icons: ^1.0.8        # iOS style icons
  flutter_screenutil: ^5.9.3    # Screen adaptation utility
  google_fonts: ^8.0.2           # Google Fonts integration
  flutter_animate: ^4.5.2        # Animation library for smooth transitions
  octo_image: ^2.1.0              # Multi-purpose Flutter image widget
  flutter_svg: ^2.2.4             # SVG rendering support
  dotted_border: ^3.1.0           # Custom border styles
  flutter_spinkit: ^5.2.2         # Loading animations
  shimmer: ^3.0.0                 # Shimmer effect for loading states
  flutter_easyloading: ^3.0.5     # Toast/loading widgets
  flutter_native_splash: ^2.4.7    # Splash screen generation utility
  fps_monitor: ^2.0.0              # Performance monitoring for FPS tracking

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 🌐 Network & Web                                               │
  # └─────────────────────────────────────────────────────────────────┘
  dio: ^5.9.2                      # HTTP client (updated: 5.9.1 → 5.9.2)
  dio_http2_adapter: ^2.7.0       # HTTP/2 support for improved performance
  web_socket_channel: ^3.0.3      # WebSocket support for real-time communication
  http: ^1.6.0                     # Additional HTTP utilities
  connectivity_plus: ^7.0.0        # Network status monitoring (WiFi/Cellular)
  webview_flutter: ^4.13.0         # WebView integration for in-app browsing
  url_launcher: ^6.3.2              # URL handling for opening links in browser/apps
  mime: ^2.0.0                      # MIME type detection for file handling

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 🌐 Web Platform Support                                         │
  # └─────────────────────────────────────────────────────────────────┘
  sqflite_common: ^2.5.0            # sqflite 公共接口（Web 支持）
  sqflite_common_ffi: ^2.4.0+2      # 桌面端 FFI 实现（Windows/Linux/macOS）
  sqflite_common_ffi_web: ^1.1.1    # Web 平台 SQLite 实现（支持 sqlite3 3.x）
  web: ^1.1.0                       # 浏览器 API 封装（IndexedDB、Blob 等）

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 💾 Data & Storage                                               │
  # └─────────────────────────────────────────────────────────────────┘
  shared_preferences: ^2.5.4       # Local key-value storage
  flutter_secure_storage: ^10.0.0  # Secure storage for sensitive data (tokens, keys)
  sqflite: ^2.4.2                   # SQLite database for local data persistence
  path: ^1.9.0                     # Path manipulation utilities
  archive: ^4.0.9                  # ZIP compression for data backup functionality

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 🎨 Theme & UI Enhancement                                      │
  # └─────────────────────────────────────────────────────────────────┘
  dynamic_color: ^1.7.0            # Material 3 dynamic color support
  cross_cache: any                 # Cross-platform caching strategy
  device_info_plus: ^12.3.0         # Device information access
  package_info_plus: ^9.0.0         # Package metadata and version info

  # ┌─────────────────────────────────────────────────────────────────┐
  # │ 📷 Media & Camera                                               │
  # └─────────────────────────────────────────────────────────────────┘
  wechat_camera_picker: ^4.5.0       # Camera picker with iOS-style interface
  wechat_assets_picker: ^10.1.1     # Asset picker for photos/videos
  photo_view: ^0.15.0                # Interactive image viewer with zoom/pan
  photo_manager: ^3.9.0              # Media management (gallery access)
  video_compress: ^3.1.4             # Video compression before upload
  image_picker: ^1.2.1               # System image picker
  file_picker: ^10.3.9               # File picker (updated: 10.3.8 → 10.3.9, API improvements)
  open_file: ^3.5.10                  # File opening with default apps
  image_crop:                         # Image cropping utility
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_crop.git
      ref: leeyi
  image: ^4.8.0                      # Image manipulation library
  image_gallery_saver:               # Save images to gallery
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_gallery_saver.git
      ref: leeyi
  video_player: ^2.11.1               # Video playback support
  flutter_local_notifications: ^20.1.0 # Local notifications support

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🔊 Audio                                                       │
  # └─────────────────────────────────────────────────────────────────┘
  flutter_sound: ^9.30.0            # Audio recording/playback with macOS improvements
  audio_session: ^0.2.2              # Audio session management for focus control
  flutter_webrtc: ^1.3.1             # WebRTC for audio/video calls
  audio_waveforms: ^2.0.1             # Audio waveform visualization
  just_audio: ^0.10.5                # Audio playback with gapless support

  # ┌─────────────────────────────────────────────────────────────────┐
  # 💬 Chat & Messaging                                             │
  # └─────────────────────────────────────────────────────────────────┘
  flutter_chat_core: any             # Core chat data models
  flutter_chat_ui: any               # Chat UI components
  flyer_chat_audio_message: any      # Audio message component
  flyer_chat_custom_message: any     # Custom message component
  flyer_chat_file_message: any       # File message component
  flyer_chat_image_message: any      # Image message component
  flyer_chat_location_message: any   # Location message component
  flyer_chat_system_message: any     # System message component
  flyer_chat_text_message: any       # Text message component
  flyer_chat_text_stream_message: any # Text stream message component
  flyer_chat_video_message: any      # Video message component

  bubble: ^1.2.1                    # Chat bubble styling
  emoji_picker_flutter: ^4.4.0       # Emoji picker integration
  highlight_text: ^1.8.0            # Text highlighting support
  flutter_markdown: ^0.7.7          # Markdown rendering

  # ┌─────────────────────────────────────────────────────────────────┐
  # 📋 Lists & Navigation                                            │
  # └─────────────────────────────────────────────────────────────────┘
  azlistview:                         # Alphabetical list view component
    git:
      url: https://gitee.com/imboy-tripartite-deps/azlistview.git
      ref: leeyi
  easy_refresh: ^3.4.0               # Pull-to-refresh functionality
  flutter_slidable: ^4.0.3           # Slidable list items with actions
  sliding_up_panel: ^2.0.0+1        # Sliding panel components

  # ┌─────────────────────────────────────────────────────────────────┐
  # 📍 Maps & Location                                               │
  # └─────────────────────────────────────────────────────────────────┘
  geolocator: ^13.0.2                   # 跨平台定位服务（支持 macOS/Web）
  amap_flutter_base_plus: ^3.1.0       # Amap (高德地图) base SDK
  amap_flutter_map_plus:               # Amap map integration
    git:
      url: https://github.com/leeyisoft/amap_flutter_map_plus.git
      ref: main
  amap_flutter_location_plus:          # Amap location services
    git:
      url: https://github.com/xiejeep/amap_flutter_location_plus.git
      ref: main
  map_launcher: ^4.4.2               # Map apps launcher (Google Maps, Amap, etc.)

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🔳 QR Code                                                     │
  # └─────────────────────────────────────────────────────────────────┘
  qr_flutter: ^4.1.0                  # QR code generation
  mobile_scanner: ^7.2.0               # QR code scanning

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🔧 Utilities                                                   │
  # └─────────────────────────────────────────────────────────────────┘
  logger: ^2.6.2                    # Logging utility
  event_bus_plus: ^0.7.0             # Event bus with progress tracking
  jose: ^0.3.5                       # JWT (JSON Web Token) handling
  pointycastle: ^4.0.0               # Cryptographic algorithms (inspired by BouncyCastle)
  asn1lib: ^1.6.5                   # ASN.1 encoding/decoding
  crypto: ^3.0.6                    # Cryptographic hashing utilities
  convert: ^3.1.2                   # Data conversion utilities
  image_picker_platform_interface: ^2.10.0 # Image picker platform interface
  permission_handler: ^12.0.1       # Permission requests
  path_provider: ^2.1.5              # File system path utilities
  file_saver: ^0.3.1                  # File saving utilities
  xid: ^1.2.1                        # Unique ID generation
  ntp: ^2.0.0                        # Network Time Protocol (time sync)
  clock: ^1.1.2                      # Time-related utilities
  equatable: ^2.0.7                  # Object equality comparisons
  synchronized: ^3.4.0               # Synchronization primitives
  share_plus: ^12.0.1                # Sharing functionality (updated: 12.0.1)
  wakelock_plus: ^1.5.1              # Keep screen on during operations
  r_upgrade:                          # App upgrade utility
    path: plugin/r_upgrade
  ic_storage_space:                   # Storage space information
    git:
      url: https://github.com/leeyisoft/IcStorageSpace.git
      ref: leeyi
  badges: ^3.1.2                     # Badge indicators on icons
  carousel_slider_plus: ^7.1.1      # Carousel slider component
  textfield_tags: ^3.0.1             # Tag input field component
  flutter_rating_bar: ^4.0.1          # Rating bar component
  filter_list:                         # Filterable list component
    git:
      url: https://gitee.com/imboy-tripartite-deps/flutter_plugin_filter_list.git
      ref: leeyi

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🔐 Authentication & Security                                     │
  # └─────────────────────────────────────────────────────────────────┘
  envied: ^1.3.2                    # Environment variables management
  local_auth: ^3.0.1                 # Local device authentication (biometrics)
  pin_code_fields: ^8.0.1             # PIN code input fields
  intl_phone_number_input: ^0.7.5    # Phone number input with validation
  jverify: ^3.1.7                   # JVerification integration

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🌍 Internationalization                                          │
  # └─────────────────────────────────────────────────────────────────┘
  lpinyin: ^2.0.3                    # Chinese pinyin conversion
  intl: ^0.20.2                      # Internationalization utilities
  feedback: ^3.2.0                   # Feedback collection UI
  popover: ^0.4.0                    # Popover dialogs
  popup_menu: ^2.1.0                 # Popup menu display
  #characters: ^1.4.1                 # Character utilities (pinned by Flutter SDK)

  # ┌─────────────────────────────────────────────────────────────────┐
  # 🏗️ State Management & Navigation                                   │
  # └─────────────────────────────────────────────────────────────────┘
  # provider: ^6.1.5+1                # ⚠️ DEPRECATED: 已迁移到 Riverpod
  visibility_detector: ^0.4.0+2    # Widget visibility detection
  slang: ^4.14.0                    # Internationalization code generation
  slang_flutter: ^4.14.0             # Flutter slang integration
  go_router: ^17.0.1                 # Declarative routing (go_router)
  flutter_riverpod: ^3.3.1           # State management
  riverpod_annotation: ^4.0.1       # Riverpod code generation (updated: 4.0.0 → 4.0.1)


dependency_overrides:
  # ┌─ Analyzer Override ───────────────────────────────────────────────┐
  # Force analyzer ^9.0.0 for riverpod_generator compatibility
  analyzer: ^9.0.0

  # ┌─ dart_style Override ──────────────────────────────────────────────┐
  # dart_style 3.1.5+ requires analyzer ^10.0.0, which conflicts with
  # riverpod_generator's requirement of analyzer ^9.0.0.
  # Pin to 3.1.3 which supports analyzer >=8.2.0 <10.0.0
  dart_style: 3.1.3

  # ┌─ Local Plugin Overrides ──────────────────────────────────────────┐
  flutter_chat_core:
    path: plugin/flutter_chat_ui/packages/flutter_chat_core
  flutter_chat_ui:
    path: plugin/flutter_chat_ui/packages/flutter_chat_ui
  flyer_chat_custom_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_custom_message
  flyer_chat_text_stream_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_stream_message
  flyer_chat_text_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_text_message
  flyer_chat_image_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_image_message
  flyer_chat_video_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_video_message
  flyer_chat_file_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_file_message
  flyer_chat_system_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_system_message
  flyer_chat_audio_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_audio_message
  flyer_chat_location_message:
    path: plugin/flutter_chat_ui/packages/flyer_chat_location_message
  cross_cache:
    path: plugin/flutter_chat_ui/packages/cross_cache
  jverify:
    path: plugin/jverify


