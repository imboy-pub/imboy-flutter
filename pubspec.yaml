name: imboy
description: A new Flutter project for IM.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.6.1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  ##############################################
  # Core Flutter & UI Framework
  ##############################################
  cupertino_icons: ^1.0.8 # iOS style icons
  niku: ^2.4.3            # Utility widgets for cleaner UI code
  flutter_screenutil: ^5.9.3 # Screen adaptation
  flutter_animate: ^4.5.2  # Animation library
  octo_image: ^2.1.0      # 多功能 Flutter 图像小部件
  flutter_svg: ^2.1.0     # SVG rendering
  dotted_border: ^3.0.1   # Custom border styles
  flutter_spinkit: ^5.2.1  # Loading animations
  flutter_easyloading: ^3.0.5 # Toast/loading widgets
  flutter_native_splash: ^2.4.6 # Splash screen generation
  fps_monitor: ^2.0.0     # Performance monitoring
  get: ^5.0.0-release-candidate-9.3.2

  ##############################################
  # Network & Web
  ##############################################
  dio: ^5.8.0+1           # HTTP client
  dio_http2_adapter: ^2.6.0 # HTTP/2 support
  web_socket_channel: ^3.0.3 # WebSocket support
  http: ^1.3.0            # Additional HTTP utilities
  connectivity_plus: ^6.1.4 # Network status
  webview_flutter: ^4.13.0 # WebView integration
  url_launcher: ^6.3.0    # URL handling
  mime: ^2.0.0            # MIME type handling

  ##############################################
  # Data & Storage
  ##############################################
  shared_preferences: ^2.5.3 # Local storage
  flutter_secure_storage: ^9.2.4 # Secure storage
  sqflite: ^2.4.2         # SQLite database
  sqflite_common_ffi: ^2.3.5 # SQLite FFI support
  sqlite3_flutter_libs: ^0.5.33 # SQLite libraries
  cached_network_image: ^3.4.1 # Image caching
  flutter_cache_manager: ^3.4.1 # Cache management
  pointycastle: ^4.0.0    # Cryptography

  ##############################################
  # Media & Camera
  ##############################################
  camera: ^0.11.1         # Camera access
  wechat_camera_picker: ^4.3.7 # Camera picker
  wechat_assets_picker: ^9.5.1 # Asset picker
  photo_view: ^0.15.0     # Interactive image viewer
  photo_manager: ^3.7.1   # Media management
  video_compress: ^3.1.4  # Video compression
  image_picker: ^1.1.2    # Image picker
  file_picker: ^10.1.9    # File picker
  open_file: ^3.5.10      # File opening
  image_crop:             # Image cropping
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_crop.git
      ref: leeyi
  image: ^4.5.4           # Image manipulation
  image_gallery_saver:    # Save to gallery
    git:
      url: https://gitee.com/imboy-tripartite-deps/image_gallery_saver.git
      ref: leeyi
  video_player: ^2.9.5    # Video playback

  ##############################################
  # Audio
  ##############################################
  flutter_sound: ^9.28.0  # Audio recording/playback
  audio_session: ^0.2.2   # Audio session management
  voice_message_package: ^2.2.1 # Voice message player
  flutter_webrtc: ^0.14.1 # WebRTC for audio/video calls

  ##############################################
  # Chat & Messaging
  ##############################################
  flutter_chat_ui: 1.6.15 # Chat UI components
  bubble: ^1.2.1          # Chat bubbles
  emoji_picker_flutter: ^4.3.0 # Emoji picker
  highlight_text: ^1.8.0  # Text highlighting
  flutter_markdown: ^0.7.7 # Markdown rendering

  ##############################################
  # Lists & Navigation
  ##############################################
  azlistview:             # Alphabetical list view
    git:
      url: https://gitee.com/imboy-tripartite-deps/azlistview.git
      ref: leeyi
  easy_refresh: ^3.4.0    # Pull-to-refresh
  flutter_slidable: ^4.0.0 # Slidable list items
  scroll_to_index:        # Scroll to index
    git:
      url: https://github.com/quire-io/scroll-to-index.git
  sliding_up_panel: ^2.0.0+1 # Sliding panels
  buttons_tabbar: ^1.3.15 # Tab bar

  ##############################################
  # Maps & Location
  ##############################################
  amap_flutter_base: ^3.0.0 # AMap base
  amap_flutter_location: ^3.0.0 # AMap location
  amap_flutter_map: ^3.0.0 # AMap maps
  map_launcher: ^3.5.0    # Map apps launcher

  ##############################################
  # QR Code
  ##############################################
  qr_flutter: ^4.1.0      # QR code generation
  mobile_scanner: ^7.0.0  # QR code scanning

  ##############################################
  # Utilities
  ##############################################
  logger: ^2.5.0          # Logging
  event_bus: ^2.0.1       # Event bus
  jose: ^0.3.4            # JWT handling
  encrypt: ^5.0.3         # Encryption
  permission_handler: ^12.0.0+1 # Permissions
  path_provider: ^2.1.5   # File system paths
  xid: ^1.2.1             # Unique ID generation
  jiffy: ^6.4.3           # Date/time handling
  ntp: ^2.0.0             # Network time protocol
  clock: ^1.1.2           # Time utilities
  equatable: ^2.0.7       # Object equality
  safemap: ^2.1.0         # Safe map access
  synchronized: ^3.3.1    # Synchronization
  share_plus: ^11.0.0     # Sharing
  wakelock_plus: ^1.3.2   # Keep screen awake
  drag_ball: ^2.0.1       # Assistive touch ball
  r_upgrade:              # App upgrade
    git:
      url: https://gitee.com/imboy-tripartite-deps/r_upgrade.git
      ref: leeyi
  ic_storage_space:       # Storage space info
    path: plugin/ic_storage_space
  nine_grid_view: ^2.0.0  # 9-grid view
  badges: ^3.1.2          # Badge indicators
  carousel_slider_plus: ^7.1.0 # Carousel slider
  textfield_tags: ^3.0.1  # Tag input field
  flutter_rating_bar: ^4.0.1
  filter_list:            # Filterable lists
    git:
      url: https://gitee.com/imboy-tripartite-deps/flutter_plugin_filter_list.git
      ref: leeyi

  ##############################################
  # Authentication & Security
  ##############################################
  envied: ^1.1.1
  local_auth: ^2.3.0      # Local authentication
  pin_code_fields: ^8.0.1 # PIN code input
  intl_phone_number_input: ^0.7.4 # Phone number input
  jverify:                # JVerification
    path: plugin/jverify

  ##############################################
  # Internationalization
  ##############################################
  lpinyin: ^2.0.3         # Chinese pinyin
  intl: ^0.20.2           # Internationalization
  feedback: ^3.1.0
  # Flutter 的弹出窗口。弹出窗口是一种瞬态视图，当您点击某个控件或某个区域时，它会出现在屏幕上其他内容的上方。
  popover: ^0.3.1
  popup_menu: ^2.1.0


dependency_overrides:
  camera_android_camerax: ^0.6.18
  # camera_android_camerax:
  #   path: plugin/packages/packages/camera/camera_android_camerax
  flutter_plugin_android_lifecycle:
    path: plugin/packages/packages/flutter_plugin_android_lifecycle
  webview_flutter_android:
    path: plugin/packages/packages/webview_flutter/webview_flutter_android
  image_picker_android:
    path: plugin/packages/packages/image_picker/image_picker_android/

  connectivity_plus:
    path: plugin/plus_plugins/packages/connectivity_plus/connectivity_plus
  device_info_plus:
    path: plugin/plus_plugins/packages/device_info_plus/device_info_plus
  #
  flutter_secure_storage:
    path: plugin/flutter_secure_storage/flutter_secure_storage
  file_saver:
    path: plugin/file_saver
  file_picker:
    path: plugin/flutter_file_picker
  flutter_native_splash:
    path: plugin/flutter_native_splash
  emoji_picker_flutter:
    path: plugin/emoji_picker_flutter
  audio_session:
    path: plugin/audio_session
  mobile_scanner:
    path: plugin/mobile_scanner
  permission_handler_android:
    path: plugin/flutter-permission-handler/permission_handler_android
  image_crop:             # Image cropping
    path: plugin/image_crop
  r_upgrade:
    path: plugin/r_upgrade
  image_gallery_saver:
    path: plugin/image_gallery_saver
  sqlite3_flutter_libs:
    path: plugin/sqlite3.dart/sqlite3_flutter_libs
  libphonenumber_plugin:
    path: plugin/plugin_libphonenumber/libphonenumber_plugin

  flutter_sound:
    path: plugin/flutter_sound

  amap_flutter_base:
    path: plugin/amap_flutter_base
  amap_flutter_map:
    path: plugin/amap_flutter_map
  amap_flutter_location:
    path: plugin/amap_flutter_location

  intl: ^0.20.2
  pointycastle: ^4.0.0    # Cryptography 一个实现加密算法和原语的 Dart 库
  camera: ^0.11.1 # dep by wechat_camera_picker

  scroll_to_index:
    git:
      url: https://gitee.com/imboy-tripartite-deps/scroll-to-index_scroll_with_keep_alives_fix.git
      ref: scroll_with_keep_alives_fix

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  fonts:
    - family: IMBoyIcon  #指定一个字体名
      fonts:
        - asset: assets/fonts/iconfont.ttf
  assets:
    - assets/example.db
    - assets/data/region.json
    - assets/images/splash_bg.png
    - assets/images/index_bar_bubble_gray.png

    - assets/images/chat/voice_volume_1.png
    - assets/images/chat/voice_volume_2.png
    - assets/images/chat/voice_volume_3.png
    - assets/images/chat/voice_volume_4.png
    - assets/images/chat/voice_volume_5.png
    - assets/images/chat/voice_volume_6.png
    - assets/images/chat/voice_volume_7.png
