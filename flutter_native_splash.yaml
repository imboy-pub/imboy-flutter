flutter_native_splash:

  # This package generates native code to customize Flutter's default white native splash screen
  # with background color and splash image.
  # Customize the parameters below, and run the following command in the terminal:
  # dart run flutter_native_splash:create
  # To restore Flutter's default white splash screen, run the following command in the terminal:
  # dart run flutter_native_splash:remove

  # Use gradient background image (consistent with Flutter SplashView)
  # Gradient colors: #42A5F5 (Light Blue) -> #2474E5 (Primary Blue) -> #1565C0 (Dark Blue)
  background_image: "assets/images/splash_gradient_bg.png"

  # If you need a solid color background, uncomment the line below and comment out background_image above
  # color: "#2474E5"

  # Logo image (centered)
  image: assets/images/splash_logo.png

  # Optional: branding property allows you to display additional brand image at the bottom
  # Only supported for Android < v12 and iOS
  # branding: assets/dart.png
  # branding_mode: bottom

  # Dark mode configuration (optional)
  # Dark mode uses the same gradient background as blue displays well on dark backgrounds
  # background_image_dark: "assets/images/splash_gradient_bg.png"
  # image_dark: assets/images/splash_logo.png

  # Android 12+ splash screen configuration
  # Android 12 uses the new Splash Screen API, requiring separate configuration
  android_12:
    # Use app logo as splash icon
    image: assets/images/splash_logo.png
    # Icon background color (use primary blue)
    icon_background_color: "#2474E5"

  # Android 12+ dark mode configuration (optional)
  # image_dark: assets/images/splash_logo.png
  # icon_background_color_dark: "#2474E5"

  # Platform switches: enable Android and iOS
  android: true
  ios: true
  # macos: true  # Enable if macOS support is needed

  # Image position configuration (default is center)
  # android_gravity: center
  # ios_content_mode: center

  # Fullscreen mode (optional, default false)
  # fullscreen: true
