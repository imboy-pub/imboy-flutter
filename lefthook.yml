# Lefthook hooks for imboyapp (Flutter / Dart)
# Generated by quality-loop T1.1 on 2026-05-08
# See .claude/plans/quality-loop.md for context

pre-commit:
  parallel: true
  commands:
    dart-fmt:
      glob: "{lib,test,integration_test}/**/*.dart"
      exclude: "**/*.{g,freezed,gr,pb}.dart"
      run: dart format --set-exit-if-changed {staged_files}
      stage_fixed: false
    dart-analyze:
      glob: "lib/**/*.dart"
      exclude: "**/*.{g,freezed,gr,pb}.dart"
      run: dart analyze --no-fatal-warnings {staged_files}
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact
    design-tokens:
      glob: "lib/**/*.dart"
      exclude: "lib/theme/**/*.dart,**/*.{g,freezed}.dart"
      run: |
        banned=$(git diff --cached --diff-filter=ACM -- {staged_files} \
          | grep '^+' | grep -v '^+++' \
          | grep -vE '^\+[[:space:]]*///' \
          | grep -E 'Color\(0x|fontSize:\s*[0-9]|\bColors\.[a-zA-Z]' || true)
        if [ -n "$banned" ]; then
          echo "❌ 禁止硬编码 Color/fontSize/Colors.*，请使用 AppColors/AppSpacing/FontSizeType Token:" >&2
          echo "$banned" >&2
          exit 1
        fi

commit-msg:
  commands:
    # 纯 shell 实现（imboyapp 是 Flutter 项目，避免引入 node 生态）
    # 校验 Conventional Commits：<type>(<scope>)!?: <subject>
    conventional:
      run: |
        if ! head -1 "{1}" | grep -qE '^(feat|fix|refactor|docs|test|chore|perf|ci|style|build|revert)(\([^)]+\))?!?: .{1,90}$'; then
          echo "❌ commit message 不符合 Conventional Commits 规范" >&2
          echo "   格式: <type>(<scope>)!?: <subject>" >&2
          echo "   type: feat|fix|refactor|docs|test|chore|perf|ci|style|build|revert" >&2
          exit 1
        fi
