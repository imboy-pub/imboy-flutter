appId: ${APP_ID}
name: "发送文字消息"
---
- launchApp
- tapOn:
    id: "tab_conversations"

# 打开第一个会话
- tapOn:
    index: 0
    id: ".*"
- takeScreenshot: chat_opened

- tapOn:
    id: "chat_message_input"
- inputText: "Maestro 自动化测试 - 请忽略"

- tapOn:
    id: "send_button"
- takeScreenshot: message_sent

- assertVisible:
    text: "Maestro 自动化测试 - 请忽略"

# iOS 右滑返回
- swipe:
    direction: RIGHT
    duration: 400
    startPoint:
      x: 5
      y: 50
    endPoint:
      x: 95
      y: 50
