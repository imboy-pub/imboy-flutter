e2eeRecoveryNewDeviceBody: |-
  Zum Schutz der Nachrichten wurde auf diesem Gerät ein neuer E2EE-Schlüssel erstellt.

  Ältere Nachrichten wurden mit dem Schlüssel des alten Geräts verschlüsselt und müssen zuerst wiederhergestellt werden. Über „Geräteübertragung“, „Soziale Wiederherstellung“ oder „Lokales Backup“ wiederherstellen.
e2eeRecoveryDecryptFailedTitle: Diese Nachricht kann nicht entschlüsselt werden
e2eeRecoveryDecryptFailedBody: |-
  Diese Nachricht wurde mit dem Schlüssel eines anderen Geräts verschlüsselt.

  Wenn Sie das Gerät gewechselt oder die App neu installiert haben, stellen Sie den Schlüssel wieder her, um ältere Nachrichten zu lesen.
