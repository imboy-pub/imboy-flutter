e2eeRecoveryNewDeviceTitle: تم رصد دخول من جهاز جديد
e2eeRecoveryNewDeviceBody: |-
  لحماية الرسائل، أنشأ هذا الجهاز مفتاح تشفير من طرف إلى طرف جديد.

  الرسائل السابقة مشفّرة بمفتاح الجهاز القديم، ويجب استعادة المفتاح أولاً لعرضها. يمكنك الاستعادة عبر «نقل الأجهزة» أو «الاستعادة الاجتماعية» أو استيراد نسخة محلية.
e2eeRecoveryDecryptFailedTitle: تعذّر فك تشفير هذه الرسالة
e2eeRecoveryDecryptFailedBody: |-
  هذه الرسالة مشفّرة بمفتاح جهاز آخر.

  إذا غيّرت الجهاز أو أعدت تثبيت التطبيق، فاستعد مفتاح التشفير لعرض الرسائل السابقة.
