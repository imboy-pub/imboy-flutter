  メッセージの安全性を保つため、このデバイスで新しいエンドツーエンド暗号キーを生成しました。

  過去のメッセージは旧デバイスのキーで暗号化されているため、閲覧にはキーの復元が必要です。「デバイス転送」「ソーシャルリカバリ」「ローカルバックアップの読み込み」で復元できます。
