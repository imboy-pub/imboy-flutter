e2eeRecoveryNewDeviceTitle: Обнаружен вход с нового устройства
e2eeRecoveryNewDeviceBody: |-
  Для защиты сообщений на этом устройстве создан новый ключ сквозного шифрования.

  Прошлые сообщения зашифрованы ключом старого устройства — сначала восстановите ключ, чтобы их прочитать. Восстановить можно через «Передачу устройств», «Социальное восстановление» или импорт локальной копии.
e2eeRecoveryDecryptFailedTitle: Не удалось расшифровать сообщение
e2eeRecoveryDecryptFailedBody: |-
  Это сообщение зашифровано ключом другого устройства.

  Если вы сменили устройство или переустановили приложение, восстановите ключ шифрования, чтобы прочитать прошлые сообщения.
