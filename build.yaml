          - lib/page/qrcode/qrcode_provider.dart
          - lib/page/passport/passport_notifier.dart
          - lib/component/image_gallery/image_gallery.dart
          - lib/page/contact/contact/contact_provider.dart
          - lib/page/contact/people_info/people_info_provider.dart
