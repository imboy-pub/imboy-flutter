# 双账号聊天测试
#
# 启动两个 App 实例进行相互聊天测试
# - 实例 1 (macOS): 账号 108@imboy.pub
# - 实例 2 (iOS 模拟器): 账号 118@imboy.pub

name: "双账号聊天测试"
description: "两个 App 实例相互发送消息测试"

instances:
  - name: "macOS 实例"
    device: "macos"
    account:
      phone: "108@imboy.pub"
      password: "admin888"

  - name: "iOS 模拟器实例"
    device: "ios"
    device_id: "0390090E-2405-436B-BF12-21684D62697F"
    account:
      phone: "118@imboy.pub"
      password: "admin888"

test_flow:
  # ========== 阶段 1: 启动两个实例 ==========
  - stage: "启动实例"
    parallel:
      - instance: "macOS 实例"
        action: "launch"
      - instance: "iOS 模拟器实例"
        action: "launch"

  # ========== 阶段 2: 登录两个账号 ==========
  - stage: "登录账号"
    parallel:
      - instance: "macOS 实例"
        steps:
          - action: "wait"
            timeout_ms: 3000
          - action: "tap"
            selector: {type: "ByText", text: "登录"}
          - action: "enter_text"
            selector: {type: "ByValueKey", key: "phone_field"}
            text: "108@imboy.pub"
          - action: "enter_text"
            selector: {type: "ByValueKey", key: "password_field"}
            text: "admin888"
          - action: "tap"
            selector: {type: "ByText", text: "登录"}

      - instance: "iOS 模拟器实例"
        steps:
          - action: "wait"
            timeout_ms: 3000
          - action: "tap"
            selector: {type: "ByText", text: "登录"}
          - action: "enter_text"
            selector: {type: "ByValueKey", key: "phone_field"}
            text: "118@imboy.pub"
          - action: "enter_text"
            selector: {type: "ByValueKey", key: "password_field"}
            text: "admin888"
          - action: "tap"
            selector: {type: "ByText", text: "登录"}

  # ========== 阶段 3: 等待登录完成 ==========
  - stage: "等待登录"
    action: "wait"
    timeout_ms: 5000

  # ========== 阶段 4: macOS 发送消息给 iOS ==========
  - stage: "macOS 发送消息"
    instance: "macOS 实例"
    steps:
      - action: "tap"
        selector: {type: "ByText", text: "联系人"}
      - action: "wait"
        timeout_ms: 1000
      - action: "tap"
        selector: {type: "ByText", text: "118"}  # 查找 118 用户
      - action: "wait"
        timeout_ms: 1000
      - action: "enter_text"
        selector: {type: "ByValueKey", key: "message_input"}
        text: "Hello from macOS!"
      - action: "tap"
        selector: {type: "ByText", text: "发送"}

  # ========== 阶段 5: 验证 iOS 收到消息 ==========
  - stage: "验证 iOS 收到消息"
    instance: "iOS 模拟器实例"
    steps:
      - action: "wait"
        timeout_ms: 3000
      - action: "verify"
        expect:
          - type: "widget_exists"
            selector: {type: "ByText", text: "Hello from macOS!"}

  # ========== 阶段 6: iOS 回复消息 ==========
  - stage: "iOS 回复消息"
    instance: "iOS 模拟器实例"
    steps:
      - action: "enter_text"
        selector: {type: "ByValueKey", key: "message_input"}
        text: "Hello from iOS!"
      - action: "tap"
        selector: {type: "ByText", text: "发送"}

  # ========== 阶段 7: 验证 macOS 收到回复 ==========
  - stage: "验证 macOS 收到回复"
    instance: "macOS 实例"
    steps:
      - action: "wait"
        timeout_ms: 3000
      - action: "verify"
        expect:
          - type: "widget_exists"
            selector: {type: "ByText", text: "Hello from iOS!"}

  # ========== 阶段 8: 截图保存 ==========
  - stage: "保存截图"
    parallel:
      - instance: "macOS 实例"
        action: "screenshot"
        filename: "chat_macos_final.png"
      - instance: "iOS 模拟器实例"
        action: "screenshot"
        filename: "chat_ios_final.png"

cleanup:
  - action: "wait"
    timeout_ms: 5000
    description: "保持应用运行 5 秒方便观察"
