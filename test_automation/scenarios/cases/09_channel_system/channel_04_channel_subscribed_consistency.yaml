  - "执行 Flutter 测试：flutter test integration_test/channel/channel_subscribed_detail_consistency_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,subscribed_detail_consistency_passed | list_to_detail_navigation_consistent"
