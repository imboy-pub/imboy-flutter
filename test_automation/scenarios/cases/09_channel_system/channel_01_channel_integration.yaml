schema_version: 1
case_id: "channel_01_channel_integration"
feature_id: "channel_system"
feature_name_cn: "频道系统"
title: "频道集成契约与未读对账"
priority: "P0"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "test/integration/channel_integration_test.dart"
  device: "macos"
  timeout_seconds: 600
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_test_env,channel_seed_data_ready"
assertions: "exit_code==0,channel_integration_passed"
ui_ux_checks: "channel_unread_summary_consistent"

steps:
  - "准备测试环境并校验前置条件：flutter_test_env,channel_seed_data_ready"
  - "执行 Flutter 测试：flutter test test/integration/channel_integration_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,channel_integration_passed | channel_unread_summary_consistent"
