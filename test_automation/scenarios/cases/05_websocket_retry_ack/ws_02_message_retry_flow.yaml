schema_version: 1
case_id: "ws_02_message_retry_flow"
feature_id: "websocket_retry_ack"
feature_name_cn: "WebSocket重试确认"
title: "消息重试流程集成"
priority: "P0"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "test/integration/message_retry_flow_integration_test.dart"
  device: "macos"
  timeout_seconds: 600
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_test_env,network_toggle_ready"
assertions: "exit_code==0,retry_flow_passed"
ui_ux_checks: "retry_state_visible,no_infinite_retry"

steps:
  - "准备测试环境并校验前置条件：flutter_test_env,network_toggle_ready"
  - "执行 Flutter 测试：flutter test test/integration/message_retry_flow_integration_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,retry_flow_passed | retry_state_visible,no_infinite_retry"
