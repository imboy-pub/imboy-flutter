schema_version: 1
case_id: "c2c_01_send_message_ui"
feature_id: "single_chat"
feature_name_cn: "单聊"
title: "单聊发送与渲染主链路"
priority: "P0"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "integration_test/chat/c2c_chat_test.dart"
  device: "macos"
  timeout_seconds: 900
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_installed,device=macos,login_ready,friend_ready"
assertions: "exit_code==0,no_unhandled_exception"
ui_ux_checks: "message_bubble_rendered,input_send_button_enabled"

steps:
  - "准备测试环境并校验前置条件：flutter_installed,device=macos,login_ready,friend_ready"
  - "执行 Flutter 测试：flutter test integration_test/chat/c2c_chat_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,no_unhandled_exception | message_bubble_rendered,input_send_button_enabled"
