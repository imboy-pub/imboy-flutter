schema_version: 1
case_id: "c2c_03_e2e_chat_flow"
feature_id: "single_chat"
feature_name_cn: "单聊"
title: "端到端聊天流程回归"
priority: "P1"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "integration_test/e2e_chat_test.dart"
  device: "macos"
  timeout_seconds: 900
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_installed,device=macos,login_ready"
assertions: "exit_code==0,e2e_flow_passed"
ui_ux_checks: "conversation_entry_visible,send_action_feedback_clear"

steps:
  - "准备测试环境并校验前置条件：flutter_installed,device=macos,login_ready"
  - "执行 Flutter 测试：flutter test integration_test/e2e_chat_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,e2e_flow_passed | conversation_entry_visible,send_action_feedback_clear"
