schema_version: 1
case_id: "c2c_02_dual_role_delivery"
feature_id: "single_chat"
feature_name_cn: "单聊"
title: "双端实时投递一致性"
priority: "P0"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "integration_test/chat/c2c_dual_role_test.dart"
  device: "macos"
  timeout_seconds: 1200
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_installed,device=macos,dual_role_accounts_ready"
assertions: "exit_code==0,delivery_consistent"
ui_ux_checks: "dual_role_receive_consistent,conversation_unread_sync"

steps:
  - "准备测试环境并校验前置条件：flutter_installed,device=macos,dual_role_accounts_ready"
  - "执行 Flutter 测试：flutter test integration_test/chat/c2c_dual_role_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,delivery_consistent | dual_role_receive_consistent,conversation_unread_sync"
