schema_version: 1
case_id: "group_01_group_chat_ui"
feature_id: "group_chat"
feature_name_cn: "群聊"
title: "群聊发送与展示主链路"
priority: "P0"
automation_mode: "auto"
status: "mapped"

runner:
  action: "flutter_test"
  test_file: "integration_test/chat/group_chat_test.dart"
  device: "macos"
  timeout_seconds: 900
  retry: 1
  dart_defines: "APP_ENV=local_home"

precondition: "flutter_installed,device=macos,login_ready,group_ready"
assertions: "exit_code==0,group_send_success"
ui_ux_checks: "group_message_list_updates,group_input_feedback_clear"

steps:
  - "准备测试环境并校验前置条件：flutter_installed,device=macos,login_ready,group_ready"
  - "执行 Flutter 测试：flutter test integration_test/chat/group_chat_test.dart"
  - "校验断言与 UI/UX 关键点：exit_code==0,group_send_success | group_message_list_updates,group_input_feedback_clear"
