# 添加好友请求测试
#
# 测试添加好友的完整流程：
# 1. 登录
# 2. 进入联系人页面
# 3. 点击添加好友
# 4. 搜索用户（手机号/UID）
# 5. 发送好友请求
# 6. 验证请求发送成功
#
# 使用方法：
#   命令我："执行 06_add_friend_request 测试"

name: "添加好友请求测试"
description: "测试搜索用户并发送好友请求的完整流程"
device: "macos"

# 测试配置
config:
  pre_launch_wait_ms: 1000
  step_delay_ms: 800
  screenshot_on_error: true
  screenshot_dir: "test_automation/reports/screenshots"

# 测试数据
test_data:
  # 发送请求的账号
  phone: "13800138000"
  password: "Test123456"

  # 目标用户信息（要添加的好友）
  target_phone: "13900139000"
  target_uid: "target_user_id"

  # 好友请求验证消息
  request_message: "你好，我是测试用户，请求添加好友"

  # 搜索方式：phone 或 uid
  search_method: "phone"

# 测试步骤
steps:
  # ========== 阶段 1: 登录应用 ==========
  - name: "阶段1: 启动应用"
    action: "launch"
    description: "启动 IM Boy 应用"

  - name: "等待启动页加载"
    action: "wait"
    timeout_ms: 3000

  - name: "点击登录按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"
    fallback_selectors:
      - type: "ByValueKey"
        key: "login_entry_button"

  - name: "等待登录页加载"
    action: "wait"
    timeout_ms: 1000

  - name: "输入手机号"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "phone_field"
    text: "${test_data.phone}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入手机号"

  - name: "输入密码"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "password_field"
    text: "${test_data.password}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入密码"

  - name: "提交登录"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"

  - name: "等待登录成功"
    action: "wait"
    timeout_ms: 5000

  # ========== 阶段 2: 进入联系人页面 ==========
  - name: "阶段2: 点击联系人标签"
    action: "tap"
    selector:
      type: "ByText"
      text: "联系人"
    description: "进入联系人页面"
    fallback_selectors:
      - type: "ByTooltip"
        message: "联系人"

  - name: "等待联系人页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取联系人页面结构"
    action: "get_widget_tree"
    description: "获取联系人页面 Widget 树"

  # ========== 阶段 3: 点击添加好友 ==========
  - name: "阶段3: 查找添加好友按钮"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "新的朋友"
        description: "查找新的朋友入口"
    on_failure: "try_alternative_entry"

  # 方式1: 通过"新的朋友"进入
  - name: "点击新的朋友"
    action: "tap"
    selector:
      type: "ByText"
      text: "新的朋友"
    fallback_selectors:
      - type: "ByTooltip"
        message: "新的朋友"

  - name: "等待新朋友页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "查找添加好友按钮"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "添加朋友"
        description: "查找添加朋友按钮"

  # 方式2: 直接通过右上角 + 按钮
  - name: "点击添加朋友按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "添加朋友"
    fallback_selectors:
      - type: "ByTooltip"
        message: "添加朋友"
      - type: "ByValueKey"
        key: "add_friend_button"

  - name: "等待添加好友页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "保存添加好友页面截图"
    action: "screenshot"
    filename: "06_add_friend_page.png"

  # ========== 阶段 4: 搜索目标用户 ==========
  - name: "阶段4: 获取添加好友页面结构"
    action: "get_widget_tree"
    description: "获取添加好友页面 Widget 树"

  - name: "点击搜索输入框"
    action: "tap"
    selector:
      type: "ByType"
      type: "TextField"
    fallback_selectors:
      - type: "ByTooltip"
        message: "搜索手机号"
      - type: "ByValueKey"
        key: "search_user_field"

  - name: "输入目标用户信息"
    action: "enter_text"
    selector:
      type: "ByType"
      type: "TextField"
    text: "${test_data.target_phone}"
    fallback_selectors:
      - type: "ByValueKey"
        key: "search_user_field"

  - name: "等待搜索结果"
    action: "wait"
    timeout_ms: 2000

  - name: "保存搜索结果截图"
    action: "screenshot"
    filename: "06_search_user_result.png"

  # ========== 阶段 5: 查看用户信息 ==========
  - name: "阶段5: 验证搜索到用户"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "添加到通讯录"
        description: "验证找到用户并可添加"

  - name: "点击用户卡片"
    action: "tap"
    selector:
      type: "ByType"
      type: "ListTile"
    fallback_selectors:
      - type: "ByTooltip"
        message: "查看用户详情"

  - name: "等待用户详情页加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取用户详情页结构"
    action: "get_widget_tree"
    description: "获取用户详情页 Widget 树"

  - name: "保存用户详情截图"
    action: "screenshot"
    filename: "06_user_detail.png"

  # ========== 阶段 6: 发送好友请求 ==========
  - name: "阶段6: 点击添加到通讯录按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "添加到通讯录"
    fallback_selectors:
      - type: "ByTooltip"
        message: "添加好友"
      - type: "ByValueKey"
        key: "add_to_contacts_button"

  - name: "等待验证请求页加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取验证请求页结构"
    action: "get_widget_tree"
    description: "获取验证请求页 Widget 树"

  - name: "点击验证消息输入框"
    action: "tap"
    selector:
      type: "ByType"
      type: "TextField"
    fallback_selectors:
      - type: "ByTooltip"
        message: "填写验证信息"

  - name: "输入验证消息"
    action: "enter_text"
    selector:
      type: "ByType"
      type: "TextField"
    text: "${test_data.request_message}"
    fallback_selectors:
      - type: "ByValueKey"
        key: "verification_message_field"

  - name: "等待输入完成"
    action: "wait"
    timeout_ms: 500

  - name: "保存验证请求截图"
    action: "screenshot"
    filename: "06_verification_request.png"

  - name: "点击发送请求按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "发送"
    fallback_selectors:
      - type: "ByTooltip"
        message: "发送好友请求"
      - type: "ByValueKey"
        key: "send_request_button"

  - name: "等待请求发送完成"
    action: "wait"
    timeout_ms: 2000

  # ========== 阶段 7: 验证请求发送成功 ==========
  - name: "阶段7: 验证发送成功提示"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "发送成功"
        description: "验证发送成功提示"

  - name: "保存发送成功截图"
    action: "screenshot"
    filename: "06_request_sent_success.png"

# 清理步骤
cleanup:
  - name: "返回联系人页面"
    action: "tap"
    selector:
      type: "ByTooltip"
      message: "返回"
    fallback_selectors:
      - type: "ByText"
        text: "返回"

  - name: "测试完成"
    action: "wait"
    timeout_ms: 2000
    description: "保持应用运行方便观察"

# 预期结果
expected_result:
  status: "passed"
  description: "成功搜索用户并发送好友请求"

# 错误处理
error_handling:
  common_errors:
    - error: "User not found"
      suggestion: "目标用户不存在或手机号/UID错误"
      action: "verify_target_user_exists"

    - error: "Already friends"
      suggestion: "已经是好友关系"
      action: "skip_test_or_use_different_user"

    - error: "Request already sent"
      suggestion: "已经发送过好友请求，等待对方处理"
      action: "run_accept_friend_test"

    - error: "Add friend button not found"
      suggestion: "检查UI路径，可能需要通过其他方式进入"
      action: "try_navigation_via_bottom_bar"

# 测试数据准备说明
setup_required:
  - name: "准备目标账号"
    description: "确保目标用户账号已注册且可被搜索"
    note: "目标用户需要设置允许被搜索"

# 后续测试
next_tests:
  - test: "07_accept_friend.yaml"
    description: "目标用户接受好友请求"
