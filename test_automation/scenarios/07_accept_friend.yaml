# 接受好友请求测试
#
# 测试接受好友请求的完整流程：
# 1. 登录（使用目标用户账号）
# 2. 查看新好友请求
# 3. 查看请求详情
# 4. 接受请求
# 5. 验证好友关系建立
#
# 使用方法：
#   命令我："执行 07_accept_friend 测试"
#
# 前置条件：
#   需要先执行 06_add_friend_request.yaml 发送好友请求

name: "接受好友请求测试"
description: "测试查看和接受好友请求的完整流程"
device: "macos"

# 测试配置
config:
  pre_launch_wait_ms: 1000
  step_delay_ms: 800
  screenshot_on_error: true
  screenshot_dir: "test_automation/reports/screenshots"

# 测试数据
test_data:
  # 接收请求的账号（目标用户）
  phone: "13900139000"
  password: "Test123456"

  # 发送请求的用户信息
  requester_name: "测试用户"

  # 预期的验证消息
  expected_message: "你好，我是测试用户，请求添加好友"

# 测试步骤
steps:
  # ========== 阶段 1: 登录应用（目标用户）==========
  - name: "阶段1: 启动应用"
    action: "launch"
    description: "启动 IM Boy 应用（目标用户账号）"

  - name: "等待启动页加载"
    action: "wait"
    timeout_ms: 3000

  - name: "点击登录按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"
    fallback_selectors:
      - type: "ByValueKey"
        key: "login_entry_button"

  - name: "等待登录页加载"
    action: "wait"
    timeout_ms: 1000

  - name: "输入手机号"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "phone_field"
    text: "${test_data.phone}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入手机号"

  - name: "输入密码"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "password_field"
    text: "${test_data.password}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入密码"

  - name: "提交登录"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"

  - name: "等待登录成功"
    action: "wait"
    timeout_ms: 5000

  # ========== 阶段 2: 进入联系人页面 ==========
  - name: "阶段2: 点击联系人标签"
    action: "tap"
    selector:
      type: "ByText"
      text: "联系人"
    description: "进入联系人页面"
    fallback_selectors:
      - type: "ByTooltip"
        message: "联系人"

  - name: "等待联系人页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取联系人页面结构"
    action: "get_widget_tree"
    description: "获取联系人页面 Widget 树"

  - name: "保存联系人页面截图"
    action: "screenshot"
    filename: "07_contact_page.png"

  # ========== 阶段 3: 查看新好友请求 ==========
  - name: "阶段3: 查找新的朋友入口"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "新的朋友"
        description: "查找新的朋友入口"

  # 检查是否有新请求徽章/红点
  - name: "检查是否有新请求提示"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "新朋友"
        description: "检查新朋友提示"
    on_failure: "show_no_new_requests_message"

  - name: "点击新的朋友"
    action: "tap"
    selector:
      type: "ByText"
      text: "新的朋友"
    fallback_selectors:
      - type: "ByTooltip"
        message: "新的朋友"

  - name: "等待新朋友页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取新朋友页面结构"
    action: "get_widget_tree"
    description: "获取新朋友页面 Widget 树"

  - name: "保存新朋友页面截图"
    action: "screenshot"
    filename: "07_new_friend_page.png"

  # ========== 阶段 4: 查看好友请求详情 ==========
  - name: "阶段4: 验证有好友请求"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "好友请求"
        description: "验证有好友请求列表"
    on_failure: "show_no_requests_message"

  - name: "查找请求者名称"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "${test_data.requester_name}"
        description: "查找测试用户的请求"
    on_failure: "show_request_not_found_message"

  - name: "点击好友请求项"
    action: "tap"
    selector:
      type: "ByText"
      text: "${test_data.requester_name}"
    description: "点击查看好友请求详情"
    fallback_selectors:
      - type: "ByTooltip"
        message: "查看请求详情"

  - name: "等待请求详情页加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取请求详情页结构"
    action: "get_widget_tree"
    description: "获取请求详情页 Widget 树"

  - name: "验证验证消息显示"
    action: "verify"
    expect:
      - type: "widget_text_contains"
        selector:
          type: "ByType"
          type: "Text"
        text: "${test_data.expected_message}"
        description: "验证验证消息内容"

  - name: "保存请求详情截图"
    action: "screenshot"
    filename: "07_friend_request_detail.png"

  # ========== 阶段 5: 接受好友请求 ==========
  - name: "阶段5: 查找接受按钮"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "接受"
        description: "查找接受按钮"
    fallback_selectors:
      - type: "ByValueKey"
        key: "accept_button"

  - name: "点击接受按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "接受"
    fallback_selectors:
      - type: "ByTooltip"
        message: "接受好友请求"
      - type: "ByValueKey"
        key: "accept_button"

  - name: "等待处理完成"
    action: "wait"
    timeout_ms: 2000

  # ========== 阶段 6: 验证好友关系建立 ==========
  - name: "阶段6: 验证接受成功提示"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "已添加"
        description: "验证已添加状态"
    fallback_expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "发消息"
        description: "验证可以发消息"

  - name: "保存接受成功截图"
    action: "screenshot"
    filename: "07_accept_success.png"

  # ========== 阶段 7: 验证联系人列表 ==========
  - name: "阶段7: 返回联系人列表"
    action: "tap"
    selector:
      type: "ByTooltip"
      message: "返回"
    fallback_selectors:
      - type: "ByText"
        text: "返回"

  - name: "等待返回完成"
    action: "wait"
    timeout_ms: 1000

  - name: "刷新联系人列表"
    action: "tap"
    selector:
      type: "ByTooltip"
      message: "下拉刷新"
    on_condition: "widget_exists"
    condition_widget:
      type: "ByTooltip"
      message: "下拉刷新"

  - name: "等待刷新完成"
    action: "wait"
    timeout_ms: 2000

  - name: "验证新好友在列表中"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "${test_data.requester_name}"
        description: "验证新好友已出现在联系人列表"

  - name: "保存最终联系人列表截图"
    action: "screenshot"
    filename: "07_contact_list_final.png"

  # ========== 阶段 8: 尝试发送消息 ==========
  - name: "阶段8: 点击新好友"
    action: "tap"
    selector:
      type: "ByText"
      text: "${test_data.requester_name}"
    description: "点击新好友进入聊天"

  - name: "等待聊天页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "验证聊天页面"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByType"
          type: "TextField"
        description: "验证消息输入框存在"

  - name: "保存聊天页面截图"
    action: "screenshot"
    filename: "07_chat_page.png"

# 清理步骤
cleanup:
  - name: "测试完成"
    action: "wait"
    timeout_ms: 2000
    description: "保持应用运行方便观察"

# 预期结果
expected_result:
  status: "passed"
  description: "成功接受好友请求并建立好友关系"

# 错误处理
error_handling:
  common_errors:
    - error: "No new friend requests"
      suggestion: "没有新的好友请求，需要先执行发送好友请求测试"
      action: "run_add_friend_request_test_first"

    - error: "Request not found"
      suggestion: "请求列表中没有找到对应的请求"
      action: "verify_request_was_sent"

    - error: "Accept failed"
      suggestion: "接受请求失败，可能是网络问题或请求已过期"
      action: "check_network_and_retry"

    - error: "Friend not in list"
      suggestion: "接受成功但联系人列表未更新，可能需要刷新"
      action: "pull_to_refresh"

# 测试数据准备说明
setup_required:
  - name: "发送好友请求"
    description: "需要先执行 06_add_friend_request.yaml 发送好友请求"
    reference_test: "06_add_friend_request.yaml"
    note: "使用不同的账号发送请求到此测试账号"

# 测试流程说明
test_flow:
  step1: "账号A (13800138000) 执行 06_add_friend_request.yaml"
  step2: "账号B (13900139000) 执行本测试 (07_accept_friend.yaml)"
  step3: "双方账号都可以验证好友关系已建立"
