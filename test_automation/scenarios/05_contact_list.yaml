# 联系人列表测试
#
# 测试联系人列表的完整功能：
# 1. 登录
# 2. 进入联系人页面
# 3. 查看联系人列表
# 4. 滚动浏览
# 5. 搜索联系人
# 6. 查看联系人详情
#
# 使用方法：
#   命令我："执行 05_contact_list 测试"

name: "联系人列表测试"
description: "测试联系人列表的查看、滚动、搜索和详情查看功能"
device: "macos"

# 测试配置
config:
  pre_launch_wait_ms: 1000
  step_delay_ms: 600
  screenshot_on_error: true
  screenshot_dir: "test_automation/reports/screenshots"

# 测试数据
test_data:
  # 登录账号
  phone: "13800138000"
  password: "Test123456"

  # 搜索测试数据
  search_keyword: "测试"
  contact_name: "测试用户"

  # 预期的最少联系人数量
  min_contacts: 1

# 测试步骤
steps:
  # ========== 阶段 1: 登录应用 ==========
  - name: "阶段1: 启动应用"
    action: "launch"
    description: "启动 IM Boy 应用"

  - name: "等待启动页加载"
    action: "wait"
    timeout_ms: 3000

  - name: "点击登录按钮"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"
    fallback_selectors:
      - type: "ByValueKey"
        key: "login_entry_button"

  - name: "等待登录页加载"
    action: "wait"
    timeout_ms: 1000

  - name: "输入手机号"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "phone_field"
    text: "${test_data.phone}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入手机号"

  - name: "输入密码"
    action: "enter_text"
    selector:
      type: "ByValueKey"
      key: "password_field"
    text: "${test_data.password}"
    fallback_selectors:
      - type: "ByTooltip"
        message: "请输入密码"

  - name: "提交登录"
    action: "tap"
    selector:
      type: "ByText"
      text: "登录"

  - name: "等待登录成功"
    action: "wait"
    timeout_ms: 5000

  # ========== 阶段 2: 进入联系人页面 ==========
  - name: "阶段2: 点击联系人标签"
    action: "tap"
    selector:
      type: "ByText"
      text: "联系人"
    description: "点击底部导航栏的联系人标签"
    fallback_selectors:
      - type: "ByTooltip"
        message: "联系人"

  - name: "等待联系人页面加载"
    action: "wait"
    timeout_ms: 1500

  - name: "保存联系人页面截图"
    action: "screenshot"
    filename: "05_contact_list_initial.png"

  # ========== 阶段 3: 验证页面结构 ==========
  - name: "阶段3: 获取联系人页面结构"
    action: "get_widget_tree"
    description: "获取联系人列表 Widget 树"

  - name: "验证页面标题"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "联系人"
        description: "验证页面标题存在"

  # ========== 阶段 4: 检查联系人列表 ==========
  - name: "阶段4: 检查联系人列表"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByType"
          type: "ListView"
        description: "验证联系人列表存在"
    on_failure: "continue"

  - name: "检查是否有联系人"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "${test_data.contact_name}"
        description: "检查是否有测试联系人"
    on_failure: "show_no_contacts_message"

  # ========== 阶段 5: 滚动联系人列表 ==========
  - name: "阶段5: 向下滚动列表"
    action: "scroll"
    dx: "0"
    dy: "-500"
    duration: "500"
    description: "向下滚动联系人列表"

  - name: "等待滚动完成"
    action: "wait"
    timeout_ms: 800

  - name: "向上滚动列表"
    action: "scroll"
    dx: "0"
    dy: "500"
    duration: "500"
    description: "向上滚动回到顶部"

  - name: "等待滚动完成"
    action: "wait"
    timeout_ms: 800

  - name: "保存滚动后截图"
    action: "screenshot"
    filename: "05_contact_list_after_scroll.png"

  # ========== 阶段 6: 搜索联系人 ==========
  - name: "阶段6: 点击搜索框"
    action: "tap"
    selector:
      type: "ByType"
      type: "SearchBar"
    fallback_selectors:
      - type: "ByTooltip"
        message: "搜索联系人"

  - name: "输入搜索关键词"
    action: "enter_text"
    selector:
      type: "ByType"
      type: "TextField"
    text: "${test_data.search_keyword}"
    fallback_selectors:
      - type: "ByValueKey"
        key: "contact_search_field"

  - name: "等待搜索结果"
    action: "wait"
    timeout_ms: 1500

  - name: "保存搜索结果截图"
    action: "screenshot"
    filename: "05_contact_list_search_result.png"

  - name: "清除搜索"
    action: "tap"
    selector:
      type: "ByTooltip"
      message: "清除搜索"
    on_condition: "widget_exists"
    condition_widget:
      type: "ByTooltip"
      message: "清除搜索"

  # ========== 阶段 7: 查看联系人详情 ==========
  - name: "阶段7: 点击联系人项"
    action: "tap"
    selector:
      type: "ByText"
      text: "${test_data.contact_name}"
    description: "点击联系人查看详情"
    fallback_selectors:
      - type: "ByTooltip"
        message: "查看联系人详情"

  - name: "等待详情页加载"
    action: "wait"
    timeout_ms: 1500

  - name: "获取详情页结构"
    action: "get_widget_tree"
    description: "获取联系人详情页 Widget 树"

  - name: "验证详情页元素"
    action: "verify"
    expect:
      - type: "widget_exists"
        selector:
          type: "ByType"
          type: "CircleAvatar"
        description: "验证头像显示"
      - type: "widget_exists"
        selector:
          type: "ByText"
          text: "发消息"
        description: "验证发消息按钮存在"

  - name: "保存联系人详情截图"
    action: "screenshot"
    filename: "05_contact_detail.png"

  # ========== 阶段 8: 返回列表 ==========
  - name: "阶段8: 返回联系人列表"
    action: "tap"
    selector:
      type: "ByTooltip"
      message: "返回"
    fallback_selectors:
      - type: "ByText"
        text: "返回"

  - name: "等待返回列表页"
    action: "wait"
    timeout_ms: 1000

  - name: "保存最终状态截图"
    action: "screenshot"
    filename: "05_contact_list_final.png"

# 清理步骤
cleanup:
  - name: "测试完成"
    action: "wait"
    timeout_ms: 2000
    description: "保持应用运行方便观察"

# 预期结果
expected_result:
  status: "passed"
  description: "成功查看、滚动、搜索联系人列表，并查看联系人详情"

# 错误处理
error_handling:
  common_errors:
    - error: "No contacts found"
      suggestion: "测试账号没有联系人，需要先添加好友"
      action: "run_add_friend_test_first"

    - error: "Contact page not loading"
      suggestion: "检查网络连接和数据加载"
      action: "verify_network_connection"

    - error: "Search not working"
      suggestion: "检查搜索框是否正确获取焦点"
      action: "retry_with_tap_before_input"

# 测试数据准备说明
setup_required:
  - name: "添加测试联系人"
    description: "在执行此测试前，需要先添加至少一个好友"
    reference_test: "05_add_friend_request.yaml"
